<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Los Ulmos - Gestión de Archivos</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌳</text></svg>">

    <style>
        :root {
            --bg-body: #f0f4f8;
            --sidebar-grad-start: #2d5a27; /* Verde bosque profundo (Ulmo) */
            --sidebar-grad-end: #5da052;   /* Verde hoja brillante */
            --accent: #f39c12;             
            --text-dark: #2c3e50;
            --text-light: #ffffff;
            --card-bg: #ffffff;
            --shadow: 0 10px 25px rgba(0,0,0,0.06);
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            font-family: 'Poppins', sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg-body);
            overflow: hidden;
            color: var(--text-dark);
        }

        /* BARRA LATERAL */
        nav {
            width: 260px;
            background: linear-gradient(180deg, var(--sidebar-grad-start), var(--sidebar-grad-end));
            color: var(--text-light);
            padding: 2rem 1rem;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        }

        nav h2 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 2.5rem;
            font-weight: 700;
            border-bottom: 2px solid rgba(255,255,255,0.2);
            padding-bottom: 15px;
        }

        .nav-item {
            padding: 14px 18px;
            cursor: pointer;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            font-weight: 500;
            opacity: 0.85;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            opacity: 1;
            transform: translateX(8px);
        }

        .nav-item.active {
            background: var(--text-light);
            color: var(--sidebar-grad-start);
            opacity: 1;
            box-shadow: var(--shadow);
        }

        /* ÁREA PRINCIPAL */
        main { flex-grow: 1; display: flex; flex-direction: column; height: 100vh; }

        .top-bar {
            background: white;
            padding: 15px 35px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e1e8ed;
        }

        .search-container { position: relative; flex-grow: 1; max-width: 400px; }
        .search-input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border-radius: 50px;
            border: 2px solid #f1f3f5;
            outline: none;
            transition: var(--transition);
        }
        .search-input:focus { border-color: var(--sidebar-grad-start); }

        .backup-controls { display: flex; gap: 10px; }
        .btn-backup {
            background: var(--text-light);
            color: var(--sidebar-grad-start);
            border: 2px solid var(--sidebar-grad-start);
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: var(--transition);
        }
        .btn-backup:hover { background: var(--sidebar-grad-start); color: white; }

        .content-body { padding: 2.5rem; overflow-y: auto; flex-grow: 1; }
        .view { display: none; }
        .view.active { display: block; animation: fadeInUp 0.4s ease-out; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { color: var(--sidebar-grad-start); margin-bottom: 2rem; font-size: 2rem; }

        /* CARDS Y SUBIDA */
        .upload-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            border: 2px dashed var(--sidebar-grad-start);
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .file-card {
            background: white;
            padding: 20px;
            border-radius: 18px;
            text-align: center;
            box-shadow: var(--shadow);
            transition: var(--transition);
            border: 1px solid transparent;
        }
        .file-card:hover { transform: translateY(-8px); border-color: var(--sidebar-grad-end); }
        .file-icon { font-size: 3.2rem; display: block; margin-bottom: 12px; cursor: pointer; }
        .file-name { font-size: 0.9rem; font-weight: 600; height: 38px; overflow: hidden; margin-bottom: 15px; }

        .btn-del {
            background: #ff7675; color: white; border: none; padding: 7px; border-radius: 8px;
            cursor: pointer; width: 100%; font-weight: 600; transition: 0.2s;
        }
        .btn-del:hover { background: #d63031; }

        .file-card.hidden { display: none; }

        /* VISOR MODAL */
        #modal-visor {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center;
            backdrop-filter: blur(4px);
        }
        .modal-content {
            background: white; width: 85%; height: 85%; border-radius: 20px;
            position: relative; padding: 25px; display: flex; flex-direction: column;
        }
        #viewer-body { flex-grow: 1; background: #f8f9fa; border-radius: 12px; display: flex; justify-content: center; align-items: center; overflow: auto; }
        #viewer-body img { max-width: 95%; max-height: 95%; object-fit: contain; }
        #viewer-body iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 2rem; cursor: pointer; color: #333; }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<nav>
    <h2>🌳 Los Ulmos</h2>
    <div class="nav-item active" onclick="showView('territorios')">📍 Territorios</div>
    <div class="nav-item" onclick="showView('mapas')">🗺️ Mapas</div>
    <div class="nav-item" onclick="showView('exhibidores')">🖼️ Exhibidores</div>
    <div class="nav-item" onclick="showView('programas')">📅 Programas</div>
    <div class="nav-item" onclick="showView('estadisticas')">📊 Estadísticas</div>
</nav>

<main>
    <div class="top-bar">
        <div class="search-container">
            <span style="position: absolute; left: 18px; top: 12px;">🔍</span>
            <input type="text" class="search-input" id="global-search" placeholder="Buscar en Los Ulmos..." onkeyup="filterFiles()">
        </div>
        <div class="backup-controls">
            <button class="btn-backup" onclick="exportDatabase()">📥 Respaldar Todo</button>
            <button class="btn-backup" onclick="document.getElementById('importFile').click()">📤 Restaurar Respaldo</button>
            <input type="file" id="importFile" style="display:none" onchange="importDatabase(this)" accept=".json">
        </div>
    </div>
    
    <div class="content-body" id="main-content"></div>
</main>

<div id="modal-visor">
    <div class="modal-content">
        <span class="close-btn" onclick="closeVisor()">&times;</span>
        <h3 id="v-title" style="margin-top: 0; color: var(--sidebar-grad-start);"></h3>
        <div id="viewer-body"></div>
    </div>
</div>

<script>
    const sections = ['territorios', 'mapas', 'exhibidores', 'programas', 'estadisticas'];
    let db;

    // Base de Datos
    const request = indexedDB.open("LosUlmosDB", 1);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        sections.forEach(s => db.createObjectStore(s, { keyPath: "id", autoIncrement: true }));
    };
    request.onsuccess = (e) => {
        db = e.target.result;
        initUI();
    };

    function initUI() {
        const container = document.getElementById('main-content');
        container.innerHTML = ""; // Limpiar antes de re-inicializar
        sections.forEach((s, i) => {
            const div = document.createElement('div');
            div.id = s;
            div.className = `view ${i === 0 ? 'active' : ''}`;
            div.innerHTML = `
                <h1 style="text-transform: capitalize;">Carpeta de ${s}</h1>
                <div class="upload-card">
                    <input type="file" id="in-${s}" style="display:none" onchange="saveFile('${s}', this)">
                    <label for="in-${s}" style="cursor:pointer; color:var(--sidebar-grad-start); font-weight:700;">
                        📁 Subir archivo a ${s.toUpperCase()}
                    </label>
                </div>
                <div id="list-${s}" class="file-grid"></div>
            `;
            container.appendChild(div);
            loadFiles(s);
        });
    }

    function showView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        // Buscar el nav-item correcto por texto
        const items = document.querySelectorAll('.nav-item');
        items.forEach(item => {
            if(item.innerText.toLowerCase().includes(id)) {
                item.classList.add('active');
            }
        });
        document.getElementById('global-search').value = "";
        filterFiles();
    }

    function saveFile(section, input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const store = db.transaction([section], "readwrite").objectStore(section);
            store.add({ name: file.name, type: file.type, data: e.target.result });
            setTimeout(() => loadFiles(section), 100);
            input.value = "";
        };
        reader.readAsDataURL(file);
    }

    function loadFiles(section) {
        const list = document.getElementById(`list-${section}`);
        if(!list) return;
        list.innerHTML = "";
        const store = db.transaction([section]).objectStore(section);
        store.openCursor().onsuccess = (e) => {
            const cursor = e.target.result;
            if (cursor) {
                const f = cursor.value;
                const card = document.createElement('div');
                card.className = 'file-card';
                card.setAttribute('data-name', f.name.toLowerCase());
                card.innerHTML = `
                    <span class="file-icon" onclick="openVisor('${f.name}', '${f.type}', '${f.data}')">${f.type.includes('image')?'🖼️':f.type.includes('pdf')?'📕':'📄'}</span>
                    <span class="file-name">${f.name}</span>
                    <button class="btn-del" onclick="deleteFile('${section}', ${f.id})">Eliminar</button>
                `;
                list.appendChild(card);
                cursor.continue();
            }
        };
    }

    function filterFiles() {
        const query = document.getElementById('global-search').value.toLowerCase();
        document.querySelectorAll('.file-card').forEach(card => {
            card.getAttribute('data-name').includes(query) ? card.classList.remove('hidden') : card.classList.add('hidden');
        });
    }

    function openVisor(name, type, data) {
        document.getElementById('v-title').innerText = name;
        const body = document.getElementById('viewer-body');
        body.innerHTML = type.includes('image') ? `<img src="${data}">` : 
                        type.includes('pdf') ? `<iframe src="${data}"></iframe>` : 
                        `<div style="padding:20px; text-align:center;"><p>No previsualizable.</p><a href="${data}" download="${name}" style="color:var(--sidebar-grad-start); font-weight:bold;">Descargar aquí</a></div>`;
        document.getElementById('modal-visor').style.display = 'flex';
    }

    function closeVisor() { document.getElementById('modal-visor').style.display = 'none'; }

    function deleteFile(section, id) {
        if(confirm("¿Eliminar este archivo de Los Ulmos?")) {
            db.transaction([section], "readwrite").objectStore(section).delete(id);
            setTimeout(() => loadFiles(section), 100);
        }
    }

    // --- LÓGICA DE RESPALDO (EXPORTAR/IMPORTAR) ---

    async function exportDatabase() {
        if(!confirm("¿Quieres descargar una copia de seguridad de todos tus archivos en Los Ulmos?")) return;
        
        let exportData = {};
        
        for (const section of sections) {
            exportData[section] = await getAllFromSection(section);
        }
        
        const blob = new Blob([JSON.stringify(exportData)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `Respaldo_LosUlmos_${new Date().toISOString().slice(0,10)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function getAllFromSection(section) {
        return new Promise((resolve) => {
            const store = db.transaction([section]).objectStore(section);
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result);
        });
    }

    function importDatabase(input) {
        const file = input.files[0];
        if (!file) return;
        
        if(!confirm("Atención: Restaurar un respaldo reemplazará todos tus archivos actuales en Los Ulmos. ¿Deseas continuar?")) {
            input.value = "";
            return;
        }

        const reader = new FileReader();
        reader.onload = async (e) => {
            const importedData = JSON.parse(e.target.result);
            
            // Limpiar DB actual
            for (const section of sections) {
                await clearSection(section);
            }
            
            // Insertar datos importados
            for (const section in importedData) {
                if (sections.includes(section)) {
                    for (const item of importedData[section]) {
                        delete item.id; // Dejar que IndexedDB asigne nuevos IDs
                        await addToSection(section, item);
                    }
                }
            }
            
            alert("Respaldo restaurado con éxito en Los Ulmos.");
            input.value = "";
            initUI(); // Re-dibujar interfaz
        };
        reader.readAsText(file);
    }

    function clearSection(section) {
        return new Promise((resolve) => {
            const transaction = db.transaction([section], "readwrite");
            transaction.objectStore(section).clear();
            transaction.oncomplete = () => resolve();
        });
    }

    function addToSection(section, item) {
        return new Promise((resolve) => {
            const transaction = db.transaction([section], "readwrite");
            transaction.objectStore(section).add(item);
            transaction.oncomplete = () => resolve();
        });
    }
</script>

</body>
</html>
